<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ניהול - חבר מביא חבר</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f9; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #1e3a8a; color: white; }
    </style>
</head>
<body>

<h1>לוח בקרה: חבר מביא חבר</h1>

<table>
    <thead>
        <tr>
            <th>שם המשרה</th>
            <th>שם העובד הממליץ</th>
            <th>מחלקת העובד</th>
            <th>שם המועמדת</th>
            <th>טלפון המועמדת</th>
            <th>סטטוס גיוס</th>
            <th>תאריך תחילת עבודה</th>
            <th>זכאות</th>
            <th>סטטוס תשלום</th>
        </tr>
    </thead>
    <tbody id="referrals-body">
        </tbody>
</table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://herzliya-mika-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // משיכת נתונים בזמן אמת מ-Firebase
    const referralsRef = ref(db, 'referrals');
    onValue(referralsRef, (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('referrals-body');
        tbody.innerHTML = ''; // ניקוי הטבלה לפני טעינה מחדש

        if (data) {
            Object.values(data).forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.jobName || ''}</td>
                    <td>${item.referrer || ''}</td>
                    <td>${item.dept || ''}</td>
                    <td>${item.candidate || ''}</td>
                    <td>${item.candidatePhone || ''}</td>
                    <td>${item.status || 'בתהליך'}</td>
                    <td>${item.startDate || 'טרם נקבע'}</td>
                    <td>${item.status === 'התקבלה' ? 'בבדיקה' : 'לא זכאי'}</td>
                    <td>${item.paymentStatus || 'טרם שולם'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    });
</script>

</body>
</html>
