<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>טופס המלצה</title>
</head>
<body>
    <form id="referralForm">
        <input type="text" id="recommender_name" placeholder="שם הממליץ" required><br>
        <input type="text" id="recommender_dept" placeholder="מחלקה" required><br>
        <input type="tel" id="recommender_phone" placeholder="טלפון ממליץ" required><br>
        <input type="text" id="candidate_name" placeholder="שם מועמדת" required><br>
        <input type="tel" id="candidate_phone" placeholder="טלפון מועמדת" required><br>
        <button type="submit" id="submitBtn">שלח המלצה</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://herzliya-mika-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('referralForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                referrer: document.getElementById('recommender_name').value,
                dept: document.getElementById('recommender_dept').value,
                phone: document.getElementById('recommender_phone').value,
                candidate: document.getElementById('candidate_name').value,
                candidatePhone: document.getElementById('candidate_phone').value,
                timestamp: new Date().toISOString()
            };
            
            push(ref(db, 'referrals'), data)
                .then(() => alert("נשלח בהצלחה!"))
                .catch((err) => alert("שגיאה: " + err.message));
        });
    </script>
</body>
</html>
