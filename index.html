<form id="referralForm">
    <div class="form-group">
        <label>שם המשרה המומלצת *</label>
        <input type="text" id="jobName" required>
    </div>
    <div class="form-group">
        <label>שם העובד הממליץ *</label>
        <input type="text" id="referrer" required>
    </div>
    <div class="form-group">
        <label>מחלקת העובד הממליץ *</label>
        <input type="text" id="dept" required>
    </div>
    <div class="form-group">
        <label>שם המועמד/ת *</label>
        <input type="text" id="candidate" required>
    </div>
    <div class="form-group">
        <label>טלפון המועמד/ת (9-10 ספרות, ללא מקפים) *</label>
        <input type="tel" id="candidatePhone" required pattern="[0-9]{9,10}" title="נא להזין מספר טלפון תקין בן 9-10 ספרות">
    </div>
    <button type="submit" id="submitBtn">שלח המלצה</button>
</form>
