<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טופס המלצה למעונות מיקה</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .form-container { 
            background: #ffffff; 
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .header-image { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .header-image img { 
            width: 100%; 
            height: auto; 
            border-radius: 10px; 
            display: block; 
        }
        h2 { 
            text-align: center; 
            color: #1e3a8a; 
            margin-bottom: 20px; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
            color: #333; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #1e3a8a; 
            color: #ffffff; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 10px; 
        }
        button:hover { background-color: #152b65; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-image">
        <!-- מוודאים שהשם הוא בדיוק MIKA.jpg -->
        <img src="MIKA.jpg" alt="חבר מביא חבר - מעונות מיקה">
    </div>
    <h2>טופס המלצה על מועמד/ת</h2>
    <form id="referralForm">
        <div class="form-group">
            <label>שם המשרה המומלצת *</label>
            <input type="text" id="jobName" required>
        </div>
        <div class="form-group">
            <label>שם העובד הממליץ *</label>
            <input type="text" id="referrer" required>
        </div>
        <div class="form-group">
            <label>מחלקת העובד הממליץ *</label>
            <input type="text" id="dept" required>
        </div>
        <div class="form-group">
            <label>שם המועמד/ת *</label>
            <input type="text" id="candidate" required>
        </div>
        <div class="form-group">
            <label>טלפון המועמד/ת (9-10 ספרות ללא מקפים) *</label>
            <input type="tel" id="candidatePhone" required pattern="[0-9]{9,10}" title="אנא הזן 9-10 ספרות בלבד">
        </div>
        <button type="submit" id="submitBtn">שלח המלצה</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://herzliya-mika-default-rtdb.europe-west1.firebasedatabase.app" };
    const db = getDatabase(initializeApp(firebaseConfig));

    document.getElementById('referralForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; 
        btn.innerText = "שולח...";
        
        push(ref(db, 'referrals'), {
            jobName: document.getElementById('jobName').value,
            referrer: document.getElementById('referrer').value,
            dept: document.getElementById('dept').value,
            candidate: document.getElementById('candidate').value,
            candidatePhone: document.getElementById('candidatePhone').value,
            status: 'בתהליך',
            timestamp: new Date().toISOString()
        }).then(() => {
            alert("ההמלצה נשלחה בהצלחה!");
            document.getElementById('referralForm').reset();
            btn.disabled = false; btn.innerText = "שלח המלצה";
        }).catch(() => {
            alert("אירעה שגיאה, אנא נסה שוב");
            btn.disabled = false; btn.innerText = "שלח המלצה";
        });
    });
</script>
</body>
</html>
