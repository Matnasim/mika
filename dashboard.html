<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>דשבורד המלצות</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f9; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #1e3a8a; color: white; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>
    <h2>רשימת המלצות שהתקבלו</h2>
    <table id="referralsTable">
        <thead>
            <tr>
                <th>שם המשרה</th>
                <th>ממליץ</th>
                <th>מחלקה</th>
                <th>מועמד</th>
                <th>טלפון</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://herzliya-mika-default-rtdb.europe-west1.firebasedatabase.app" }));

    onValue(ref(db, 'referrals'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // ניקוי הטבלה לפני עדכון

        for (let key in data) {
            let row = `<tr>
                <td>${data[key].jobName}</td>
                <td>${data[key].referrer}</td>
                <td>${data[key].dept}</td>
                <td>${data[key].candidate}</td>
                <td>${data[key].candidatePhone}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
    });
</script>
</body>
</html>
