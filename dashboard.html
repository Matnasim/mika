<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ניהול - עריכת המלצות</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=Assistant:wght@400;500;600;700&display=swap');

        :root {
            --wine: #6E1330;
            --wine-deep: #480A20;
            --fuchsia: #E4007C;
            --fuchsia-soft: #FF4FA6;
            --black: #121212;
            --white: #FFFFFF;
            --blush: #FBF2F5;
            --line: #EBD9E1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            padding: 0 0 40px;
            margin: 0;
            background: var(--blush);
            color: var(--black);
        }

        .page-header {
            position: relative;
            text-align: center;
            padding: 40px 20px 46px;
            margin-bottom: 26px;
            background: linear-gradient(135deg, var(--black) 0%, var(--wine-deep) 45%, var(--wine) 75%, var(--fuchsia) 130%);
            overflow: hidden;
        }
        .page-header::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 85% 20%, rgba(228,0,124,0.35) 0%, transparent 55%);
            pointer-events: none;
        }
        .header-logo {
            position: relative;
            z-index: 2;
            max-width: 170px;
            height: auto;
            margin-bottom: 18px;
            filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35));
            background: var(--white);
            border-radius: 14px;
            padding: 10px 14px;
        }
        .header-title {
            position: relative;
            z-index: 2;
            margin: 0;
            font-family: 'Rubik', sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 4.2vw, 42px);
            letter-spacing: .3px;
            line-height: 1.25;
            background: linear-gradient(90deg, #FFFFFF 0%, #FFD6EC 55%, var(--fuchsia-soft) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-rule {
            position: relative;
            z-index: 2;
            width: 90px;
            height: 4px;
            margin: 18px auto 0;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--fuchsia), var(--wine));
        }

        h3 { font-family: 'Rubik', sans-serif; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        table { width: 100%; border-collapse: collapse; background: var(--white); margin-top: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 26px rgba(18,18,18,0.12); }
        th, td { border: 1px solid var(--line); padding: 12px 10px; text-align: right; font-size: 14.5px; }
        th { background-color: var(--black); color: var(--white); font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: .2px; }
        tbody tr:hover { background-color: #FDF0F6; }
        select, input { padding: 7px 8px; width: 100%; box-sizing: border-box; border: 1.5px solid var(--line); border-radius: 6px; font-family: 'Assistant', sans-serif; background: var(--white); color: var(--black); }
        select:focus, input:focus { outline: none; border-color: var(--fuchsia); box-shadow: 0 0 0 3px rgba(228,0,124,0.15); }

        button { background-color: var(--fuchsia); color: white; border: none; padding: 8px 14px; cursor: pointer; border-radius: 6px; margin: 2px; font-family: 'Rubik', sans-serif; font-weight:600; font-size: 13.5px; transition: background .15s ease, transform .1s ease; }
        button:hover { background-color: #C3005F; }
        button:active { transform: scale(0.97); }
        .delete-btn { background-color: var(--black); }
        .delete-btn:hover { background-color: #000000; }

        .add-box { background: var(--white); margin-top: 8px; padding: 22px 22px 20px; border-radius: 12px; box-shadow: 0 10px 26px rgba(18,18,18,0.12); border-right: 5px solid var(--fuchsia); }
        .add-box h3 { margin: 0 0 16px; color: var(--wine); font-size: 18px; font-weight: 700; }
        .add-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .add-grid label { display: block; font-size: 12px; color: #6b6b6b; margin-bottom: 4px; font-weight: 600; }
        #add-row-btn { background-color: var(--black); }
        #add-row-btn:hover { background-color: var(--wine-deep); }
        .chart-box { background: var(--white); margin-top: 20px; padding: 22px; border-radius: 12px; box-shadow: 0 10px 26px rgba(18,18,18,0.12); border-right: 5px solid var(--wine); }
        .chart-box h3 { margin: 0 0 16px; color: var(--wine); font-size: 18px; font-weight: 700; }
        .chart-wrap { position: relative; height: 460px; max-width: 640px; margin: 0 auto; }
        .toolbar { display: flex; align-items: center; justify-content: space-between; margin-top: 22px; }
        .record-count { font-size: 14px; color: #6b6b6b; font-weight: 600; }
        #export-btn { background-color: var(--wine); }
        #export-btn:hover { background-color: var(--wine-deep); }
        .empty-msg { text-align:center; color:#999; padding: 34px; font-style: italic; }
    </style>
</head>

                <option value='מרכז קהילתי נחלת עדה- גן רש"ל'>מרכז קהילתי נחלת עדה- גן רש"ל</option>
                <option value="מרכז קהילתי נווה עמל">מרכז קהילתי נווה עמל</option>
                <option value="מרכז קהילתי יבור">מרכז קהילתי יבור</option>
                <option value="מרכז קהילתי ליה">מרכז קהילתי ליה</option>
                <option value="אשכול פיס זאב">אשכול פיס זאב</option>
                <option value='יום מל"א'>יום מל"א</option>
                <option value="צהרון דמוקרטי">צהרון דמוקרטי</option>

                <option value="מרכזי למידה">מרכזי למידה</option>
                <option value="מעונות">מעונות</option>
                <option value="בית ספר דמוקרטי">בית ספר דמוקרטי</option>
                <option value="מרכז מדעים">מרכז מדעים</option>
                <option value="מוקד תורני">מוקד תורני</option>
                <option value="גיל הזהב">גיל הזהב</option>

            <label>סטטוס גיוס</label>
            <select id="new-status">
                <option value="בתהליך">בתהליך</option>
                <option value="התקבלה">התקבלה</option>
                <option value="נדחתה">נדחתה</option>
            </select>
        </div>
        <div>
            <label>תאריך תחילת עבודה</label>
            <input type="date" id="new-startDate">
        </div>
        <div>

            <select id="new-paymentStatus">

    <span id="record-count" class="record-count"></span>
    <button id="export-btn" onclick="exportToExcel()">⬇ ייצוא לאקסל</button>

<table>
    <thead>
        <tr>
            <th>שם המשרה</th>
            <th>שם הממליץ</th>
            <th>מחלקת הממליץ</th>
            <th>שם המועמד/ת</th>
            <th>טלפון המועמד/ת</th>
            <th>סטטוס גיוס</th>
            <th>תאריך תחילת עבודה</th>
            <th>סטטוס תשלום</th>
            <th>פעולה</th>
        </tr>
    </thead>
    <tbody id="referrals-body">
    </tbody>
</table>

<div class="chart-box">
    <h3>התפלגות המלצות לפי מחלקה</h3>
    <div class="chart-wrap">
        <canvas id="dept-chart"></canvas>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://herzliya-mika-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const referralsRef = ref(db, 'referrals');

    const DEPARTMENTS = [
        "מטה",
        "מרכז קהילתי גליל ים",
        "מרכז קהילתי נינא",
        "מרכז קהילתי נוף ים",
        "מרכז קהילתי מטאור",
        'מרכז קהילתי נחלת עדה- גן רש"ל',
        "מרכז קהילתי נווה עמל",
        "מרכז קהילתי יבור",
        "מרכז קהילתי ליה",
        "אשכול פיס זאב",
        'יום מל"א',
        "צהרון דמוקרטי",
        "בית ספר גורדון",
        "מרכזי למידה",
        "מעונות",
        "בית ספר דמוקרטי",
        "מרכז מדעים",
        "מוקד תורני",
        "גיל הזהב",
        'יול"א',
        "עמיתים",
        "רעים"
    ];

    let deptChart = null;
    let latestData = null;
    const PALETTE = ['#6E1330', '#E4007C', '#121212', '#9C1F49', '#FF4FA6', '#480A20', '#C3005F', '#8C1D3B', '#F291C7', '#2B0812', '#D6006F', '#4A4A4A'];

    function renderDeptChart(data) {
        const counts = {};
        DEPARTMENTS.forEach(d => counts[d] = 0);
        let other = 0;

        if (data) {
            Object.values(data).forEach(item => {
                const dept = (item.referrerDept || '').trim();
                if (!dept) return;
                if (Object.prototype.hasOwnProperty.call(counts, dept)) {
                    counts[dept]++;
                } else {
                    other++;
                }
            });
        }

        // מציגים בתרשים העיגול רק מחלקות שכבר יש להן לפחות המלצה אחת
        const labels = [];
        const values = [];
        DEPARTMENTS.forEach(d => {
            if (counts[d] > 0) { labels.push(d); values.push(counts[d]); }
        });
        if (other > 0) { labels.push('אחר / לא ברשימה'); values.push(other); }

        const colors = labels.map((_, i) => PALETTE[i % PALETTE.length]);

        if (labels.length === 0) {
            labels.push('אין עדיין נתונים');
            values.push(1);
            colors[0] = '#E5E5E5';
        }

        if (deptChart) {
            deptChart.data.labels = labels;
            deptChart.data.datasets[0].data = values;
            deptChart.data.datasets[0].backgroundColor = colors;
            deptChart.update();
        } else {
            const ctx = document.getElementById('dept-chart').getContext('2d');
            deptChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'מספר המלצות',
                        data: values,
                        backgroundColor: colors,
                        borderColor: '#FFFFFF',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            rtl: true,
                            labels: { font: { family: 'Assistant', size: 12 }, padding: 14 }
                        },
                        tooltip: { rtl: true, bodyFont: { family: 'Assistant' } }
                    }
                }
            });
        }
    }


    onValue(referralsRef, (snapshot) => {
        const data = snapshot.val();
        latestData = data;
        renderDeptChart(data);
        const tbody = document.getElementById('referrals-body');
        tbody.innerHTML = '';
        const countEl = document.getElementById('record-count');

        if (data) {
            // מיון לפי החדשות ביותר קודם (המפתחות של Firebase push() עולים כרונולוגית)
            const entries = Object.entries(data).reverse();
            countEl.textContent = `סה"כ ${entries.length} המלצות`;

            entries.forEach(([key, item]) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.jobName || ''}</td>
                    <td>${item.referrer || ''}</td>
                    <td>${item.referrerDept || ''}</td>
                    <td>${item.candidate || ''}</td>
                    <td>${item.candidatePhone || ''}</td>
                    <td>
                        <select id="status-${key}">
                            <option value="בתהליך" ${item.status === 'בתהליך' ? 'selected' : ''}>בתהליך</option>
                            <option value="התקבלה" ${item.status === 'התקבלה' ? 'selected' : ''}>התקבלה</option>
                            <option value="נדחתה" ${item.status === 'נדחתה' ? 'selected' : ''}>נדחתה</option>
                        </select>
                    </td>
                    <td><input type="date" id="date-${key}" value="${item.startDate || ''}"></td>
                    <td>
                        <select id="payment-${key}">
                            <option value="טרם שולם" ${item.paymentStatus === 'טרם שולם' ? 'selected' : ''}>טרם שולם</option>
                            <option value="שולם" ${item.paymentStatus === 'שולם' ? 'selected' : ''}>שולם</option>
                        </select>
                    </td>
                    <td>
                        <button onclick="updateRecord('${key}')">שמור</button>
                        <button class="delete-btn" onclick="deleteRecord('${key}')">מחק</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } else {
            countEl.textContent = 'סה"כ 0 המלצות';
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="9" class="empty-msg">עדיין לא התקבלו המלצות</td>`;
            tbody.appendChild(tr);
        }
    });

    // פונקציה לעדכון הנתונים ב-Firebase
    window.updateRecord = (key) => {
        const newStatus = document.getElementById(`status-${key}`).value;
        const newDate = document.getElementById(`date-${key}`).value;
        const newPayment = document.getElementById(`payment-${key}`).value;

        update(ref(db, 'referrals/' + key), {
            status: newStatus,
            startDate: newDate,
            paymentStatus: newPayment
        }).then(() => {
            alert("הנתונים עודכנו בהצלחה!");
        }).catch((error) => {
            alert("שגיאה בעדכון: " + error.message);
        });
    };

    // פונקציה למחיקת רשומה מ-Firebase
    window.deleteRecord = (key) => {
        const confirmed = confirm("האם למחוק לצמיתות את ההמלצה הזו? לא ניתן לשחזר לאחר המחיקה.");
        if (!confirmed) return;

        remove(ref(db, 'referrals/' + key))
            .then(() => {
                alert("ההמלצה נמחקה בהצלחה!");
            })
            .catch((error) => {
                alert("שגיאה במחיקה: " + error.message);
            });
    };

    // פונקציה להוספת רשומה חדשה באופן ידני
    window.addRecord = () => {
        const jobName = document.getElementById('new-jobName').value.trim();
        const referrer = document.getElementById('new-referrer').value.trim();
        const candidate = document.getElementById('new-candidate').value.trim();

        if (!jobName || !referrer || !candidate) {
            alert("נא למלא לפחות שם משרה, שם ממליץ ושם מועמד/ת");
            return;
        }

        const newRecord = {
            jobName: jobName,
            referrer: referrer,
            referrerDept: document.getElementById('new-referrerDept').value.trim(),
            candidate: candidate,
            candidatePhone: document.getElementById('new-candidatePhone').value.trim(),
            status: document.getElementById('new-status').value,
            startDate: document.getElementById('new-startDate').value,
            paymentStatus: document.getElementById('new-paymentStatus').value
        };

        push(referralsRef, newRecord)
            .then(() => {
                alert("השורה נוספה בהצלחה!");
                // איפוס השדות לאחר הוספה
                document.getElementById('new-jobName').value = '';
                document.getElementById('new-referrer').value = '';
                document.getElementById('new-referrerDept').value = '';
                document.getElementById('new-candidate').value = '';
                document.getElementById('new-candidatePhone').value = '';
                document.getElementById('new-status').value = 'בתהליך';
                document.getElementById('new-startDate').value = '';
                document.getElementById('new-paymentStatus').value = 'טרם שולם';
            })
            .catch((error) => {
                alert("שגיאה בהוספת השורה: " + error.message);
            });
    };

    // פונקציה לייצוא כל הנתונים לקובץ אקסל
    window.exportToExcel = () => {
        if (!latestData || Object.keys(latestData).length === 0) {
            alert("אין נתונים לייצוא כרגע");
            return;
        }

        const entries = Object.entries(latestData).reverse();
        const rows = entries.map(([, item]) => ({
            'שם המשרה': item.jobName || '',
            'שם הממליץ': item.referrer || '',
            'מחלקת הממליץ': item.referrerDept || '',
            'שם המועמד/ת': item.candidate || '',
            'טלפון המועמד/ת': item.candidatePhone || '',
            'סטטוס גיוס': item.status || '',
            'תאריך תחילת עבודה': item.startDate || '',
            'סטטוס תשלום': item.paymentStatus || ''
        }));

        const ws = XLSX.utils.json_to_sheet(rows);
        ws['!cols'] = [
            { wch: 24 }, { wch: 18 }, { wch: 28 }, { wch: 18 },
            { wch: 15 }, { wch: 12 }, { wch: 16 }, { wch: 12 }
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'המלצות');

        const dateStr = new Date().toISOString().slice(0, 10);
        XLSX.writeFile(wb, `המלצות_חבר-מביא-חבר_${dateStr}.xlsx`);
    };
</script>


</div>

</body>
</html>
